databases:
  - name: appli-suivi-projets-db
    databaseName: appli_suivi_projets
    user: appli_user
    plan: free

services:
  - type: web
    name: appli-suivi-projets-bailleurs
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: appli-suivi-projets-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
